<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elliptical Galaxy</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            overflow-x: hidden;
        }
        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #scroll-host {
            height: 300vh;
            position: relative;
            z-index: 1;
            pointer-events: none;
        }
        #scroll-hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="scene"></canvas>
    <div id="scroll-host"></div>
    <div id="scroll-hint">scroll ↓</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.143.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.143.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';
        import { CopyShader } from 'three/addons/shaders/CopyShader.js';

        const Lerp = (a, b, t = 0.075) => a + (b - a) * t;
        function hexToVec3(hex) {
            const n = parseInt(hex.slice(1), 16);
            return new THREE.Vector3(((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255);
        }
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        // Fixed parameters
        const coreColor = '#fff3b0';
        const midColor = '#ffb52a';
        const rimColor = '#3a1402';
        const twinkleColor = '#ff5e8a';
        const galaxyCount = 79;
        const spread = 13;
        const R = 1.7;
        const tumbleSpeed = 0.2;
        const wobbleAmount = 0.205;
        const wobbleSpeed = 0.35;
        const gradientPow = 0.2;
        const twinkleAmount = 0.71;
        const twinkleSpeed = 2.45;
        const scrollDiveZ = 4;
        const scrollSpin = 2.62;
        const scrollExpand = 1;
        const atmoColor = '#ffd9a0';
        const atmoCount = 350;
        const atmoSize = 14;
        const atmoSpeed = 0.8;

        const LAYERS = { NONE: 0, TORUS_SCENE: 1, BLOOM_SCENE: 2, ENTIRE_SCENE: 3 };

        const canvas = document.getElementById('scene');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.VSMShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 0, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 80);
        camera.position.set(0, 0, 14);
        camera.layers.enable(LAYERS.TORUS_SCENE);
        camera.layers.enable(LAYERS.BLOOM_SCENE);
        camera.layers.enable(LAYERS.ENTIRE_SCENE);
        scene.add(camera);

        // Galaxy Cloud
        class GalaxyCloud {
            constructor() {
                this.group = new THREE.Group();
                this.group.position.z = -20;
                scene.add(this.group);

                this.R = R;
                this.count = { stars: 90000 };

                this.geometry = this.createGeometry();
                this.material = this.createMaterial();

                this.points = new THREE.Points(this.geometry, this.material);
                this.points.frustumCulled = false;
                this.points.layers.set(LAYERS.ENTIRE_SCENE);
                this.group.add(this.points);

                this.appearStart = performance.now();
                this.opacity = 0;
                this.animate = 0;
            }

            createGeometry() {
                const N = this.count.stars;
                const positions = new Float32Array(N * 3);
                const shells = new Float32Array(N);
                const sizes = new Float32Array(N);
                const ids = new Float32Array(N);

                const K = Math.max(1, Math.round(galaxyCount));
                const SP = spread;
                const frames = [];

                for (let k = 0; k < K; k++) {
                    frames.push({
                        m: new THREE.Matrix4().makeRotationFromEuler(new THREE.Euler(
                            Math.random() * Math.PI,
                            Math.random() * Math.PI,
                            Math.random() * Math.PI
                        )),
                        size: 0.18 + 0.34 * Math.random(),
                        ecc: 0.45 + 0.42 * Math.random(),
                        thick: 0.06 + 0.05 * Math.random(),
                        ox: (Math.random() - 0.5) * 2 * SP,
                        oy: (Math.random() - 0.5) * 2 * SP,
                        oz: (Math.random() - 0.5) * 2 * SP * 0.6
                    });
                }

                const tmp = new THREE.Vector3();
                for (let i = 0; i < N; i++) {
                    const f = frames[i % K];
                    const th = Math.random() * 2 * Math.PI;
                    const rad = Math.pow(Math.random(), 1.4);
                    const rx = f.size * this.R * rad;
                    const rz = f.size * this.R * f.ecc * rad;
                    const y = (Math.random() - 0.5) * 2 * f.thick * this.R * rad;

                    tmp.set(rx * Math.cos(th), y, rz * Math.sin(th)).applyMatrix4(f.m);
                    tmp.x += f.ox; tmp.y += f.oy; tmp.z += f.oz;

                    positions[i * 3] = tmp.x;
                    positions[i * 3 + 1] = tmp.y;
                    positions[i * 3 + 2] = tmp.z;

                    shells[i] = rad;
                    sizes[i] = 6 + 9 * Math.random();
                    ids[i] = Math.random();
                }

                const g = new THREE.BufferGeometry();
                g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                g.setAttribute('shell', new THREE.BufferAttribute(shells, 1));
                g.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                g.setAttribute('id', new THREE.BufferAttribute(ids, 1));
                return g;
            }

            createMaterial() {
                const uniforms = {
                    iTime: { value: 0 },
                    iAnimate: { value: 0 },
                    uOpacity: { value: 1 },
                    uExpand: { value: 1 },
                    uWobbleAmount: { value: wobbleAmount },
                    uWobbleSpeed: { value: wobbleSpeed },
                    uCore: { value: hexToVec3(coreColor) },
                    uMid: { value: hexToVec3(midColor) },
                    uRim: { value: hexToVec3(rimColor) },
                    uTwinkle: { value: hexToVec3(twinkleColor) },
                    uGradientPow: { value: gradientPow },
                    uTwinkleAmount: { value: twinkleAmount },
                    uTwinkleSpeed: { value: twinkleSpeed }
                };

                return new THREE.ShaderMaterial({
                    uniforms,
                    vertexShader: `
                        attribute float size; attribute float id; attribute float shell;
                        uniform float iTime; uniform float iAnimate; uniform float uExpand;
                        uniform float uWobbleAmount; uniform float uWobbleSpeed;
                        varying float vShell; varying float vId;
                        void main() {
                            vShell = shell; vId = id;
                            float ph = id * 6.2831853;
                            vec3 wob = vec3(sin(iTime * uWobbleSpeed + ph),
                                            cos(iTime * uWobbleSpeed * 1.3 + ph),
                                            sin(iTime * uWobbleSpeed * 0.7 + ph)) * uWobbleAmount;
                            vec3 p = (position + wob) * uExpand;
                            vec4 mv = modelViewMatrix * vec4(p, 1.0);
                            gl_PointSize = size / -mv.z * (0.5 + 0.5 * iAnimate);
                            vec4 res = projectionMatrix * mv;
                            float a = pow(iAnimate, 0.6);
                            res.xy *= clamp(2.0 * a + pow(id, 0.7) - 1.0, 0.0, 1.0);
                            gl_Position = res;
                        }
                    `,
                    fragmentShader: `
                        uniform float iTime; uniform float uOpacity;
                        uniform vec3 uCore; uniform vec3 uMid; uniform vec3 uRim; uniform vec3 uTwinkle;
                        uniform float uGradientPow; uniform float uTwinkleAmount; uniform float uTwinkleSpeed;
                        varying float vShell; varying float vId;
                        vec3 grad3(vec3 a, vec3 b, vec3 c, float t) {
                            return t < 0.5 ? mix(a, b, t * 2.0) : mix(b, c, clamp((t - 0.5) * 2.0, 0.0, 1.0));
                        }
                        void main() {
                            float t = pow(vShell, uGradientPow);
                            vec3 col = grad3(uCore, uMid, uRim, t);
                            float tw = 0.5 + 0.5 * sin(iTime * uTwinkleSpeed + vId * 100.0);
                            col = mix(col, uTwinkle, tw * uTwinkleAmount * (1.0 - t));
                            col *= (0.45 + 0.85 * (1.0 - t));
                            float tex = 1.0 - smoothstep(0.5, 1.0, length(2.0 * gl_PointCoord - 1.0));
                            gl_FragColor = vec4(col * tex, tex * uOpacity);
                        }
                    `,
                    transparent: true,
                    depthTest: false,
                    blending: THREE.AdditiveBlending
                });
            }

            update(scroll) {
                const t = performance.now() / 1000;
                const elapsed = (performance.now() - this.appearStart) / 1000;

                // Appear animation
                let animT = clamp((elapsed) / 2.0, 0, 1);
                this.material.uniforms.iAnimate.value = animT * animT * (3 - 2 * animT);

                let slideT = clamp((elapsed - 0.5) / 1.5, 0, 1);
                slideT = 1 - Math.pow(1 - slideT, 4);
                this.group.position.z = Lerp(-20, 0, slideT);
                this.material.uniforms.uOpacity.value = Lerp(0, 1, slideT);

                // Scroll effects
                this.material.uniforms.iTime.value = t;
                this.material.uniforms.uExpand.value = 1 + scroll * scrollExpand;

                const spin = tumbleSpeed * (1 + scroll * scrollSpin) * 0.016;
                this.group.rotation.y += spin;
                this.group.rotation.x += spin * 0.35;
            }
        }

        const galaxy = new GalaxyCloud();

        // Atmosphere Motes
        const N = atmoCount;
        const positions = new Float32Array(N * 3);
        const sizes = new Float32Array(N);
        const seeds = new Float32Array(N);

        for (let i = 0; i < N; i++) {
            positions[i*3] = 2*Math.random()-1;
            positions[i*3+1] = 2*Math.random()-1;
            positions[i*3+2] = 2*Math.random()-1;
            sizes[i] = atmoSize * (0.4 + Math.random());
            seeds[i] = Math.random();
        }

        const atmoGeometry = new THREE.BufferGeometry();
        atmoGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        atmoGeometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
        atmoGeometry.setAttribute('seed', new THREE.Float32BufferAttribute(seeds, 1));

        const atmoUniforms = {
            uTime: { value: 0 },
            uColor: { value: hexToVec3(atmoColor) },
            uRes: { value: new THREE.Vector2(window.innerWidth * window.devicePixelRatio, window.innerHeight * window.devicePixelRatio) }
        };

        const atmoMaterial = new THREE.ShaderMaterial({
            uniforms: atmoUniforms,
            vertexShader: `
                attribute float size; attribute float seed; uniform float uTime; uniform vec2 uRes;
                varying float vA;
                vec3 warp(vec3 p, float t){ float c=0.9,a=1.9,b=0.02,s=0.05; p*=2.;
                  p.x+=c*sin(s*t+a*p.y)+t*b; p.y+=c*cos(s*t+a*p.x); p.y+=c*sin(s*t+a*p.z)+t*b;
                  p.z+=c*cos(s*t+a*p.y); p.z+=c*sin(s*t+a*p.x)+t*b; p.x+=c*cos(s*t+a*p.z);
                  return cos(p+vec3(1,2,4)); }
                void main(){
                  vec3 v = position*4.0 + warp(position, uTime)*1.2;
                  vec4 mv = modelViewMatrix * vec4(v, 1.0);
                  float r = length(v); float farF = 1.0 - smoothstep(5.0, 6.5, r); float nearF = smoothstep(0.0, 0.5, -mv.z);
                  vA = farF * nearF;
                  gl_PointSize = size * uRes.y / 900.0 / -mv.z; gl_PointSize = max(gl_PointSize, 1.0);
                  gl_Position = projectionMatrix * mv;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor; varying float vA;
                void main(){ vec2 p = gl_PointCoord - 0.5; float l = length(p); if (l > 0.5) discard;
                  float tex = smoothstep(0.5, 0.0, l); gl_FragColor = vec4(uColor * tex, tex * vA * 0.55); }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false
        });

        const atmoPoints = new THREE.Points(atmoGeometry, atmoMaterial);
        atmoPoints.frustumCulled = false;
        atmoPoints.layers.set(LAYERS.ENTIRE_SCENE);
        scene.add(atmoPoints);

        // Postprocessing
        let renderScene, torusComposer, bloomComposer, finalComposer, finalPass;

        function initPostprocessing() {
            renderScene = new RenderPass(scene, camera);

            torusComposer = new EffectComposer(renderer);
            torusComposer.renderToScreen = false;
            torusComposer.addPass(renderScene);
            torusComposer.addPass(new ShaderPass(GammaCorrectionShader));
            torusComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.22, 0.2, 0));
            torusComposer.addPass(new ShaderPass(CopyShader));

            bloomComposer = new EffectComposer(renderer);
            bloomComposer.renderToScreen = false;
            bloomComposer.addPass(renderScene);
            bloomComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.35, 0.5, 0));
            bloomComposer.addPass(new ShaderPass(GammaCorrectionShader));

            finalPass = new ShaderPass({
                uniforms: {
                    iTime: { value: 0 },
                    tDiffuse: { value: null },
                    torusTexture: { value: null },
                    bloomTexture: { value: null },
                    haloTexture: { value: null },
                    iCornerBlue: { value: hexToVec3('#ffcf2a') },
                    iCornerOrange: { value: hexToVec3('#ff3b1f') }
                },
                vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float iTime; uniform sampler2D tDiffuse; uniform sampler2D bloomTexture; uniform sampler2D torusTexture; uniform sampler2D haloTexture;
                    uniform vec3 iCornerBlue; uniform vec3 iCornerOrange; varying vec2 vUv;
                    vec3 warp3d(vec3 pos, float t) {
                      float curv = .8, a = 1.9, b = 0.7; pos *= 2.;
                      pos.x += curv * sin(t + a * pos.y) + t * b; pos.y += curv * cos(t + a * pos.x);
                      pos.y += curv * sin(t + a * pos.z) + t * b; pos.z += curv * cos(t + a * pos.y);
                      pos.z += curv * sin(t + a * pos.x) + t * b; pos.x += curv * cos(t + a * pos.z);
                      return 0.5 + 0.5 * cos(pos.xyz + vec3(1, 2, 4));
                    }
                    void main() {
                      vec2 uv = 2. * vUv - 1.;
                      vec3 w = pow(warp3d(vec3(uv.x, sin(uv.y), uv.y), iTime * 1.5), vec3(1.5));
                      vec3 col = 1.5 * iCornerBlue * w.x; col *= w.y; col += iCornerOrange * w.z;
                      col *= smoothstep(0.6, 1., abs(uv.y));
                      col *= smoothstep(-.5, 1., -uv.y * uv.x); col *= smoothstep(-.5, 1., -uv.y * uv.x);
                      vec3 halo = texture2D(haloTexture, vUv).xyz;
                      vec3 atmoBg = vec3(0.02, 0.03, 0.10) * (1.0 - 0.4 * length(uv));
                      gl_FragColor = vec4(atmoBg + col * 0.2 + texture2D(bloomTexture, vUv).xyz + texture2D(torusTexture, vUv).xyz + texture2D(tDiffuse, vUv).xyz + halo, 1.);
                    }
                `
            });

            finalPass.uniforms.torusTexture.value = torusComposer.renderTarget1.texture;
            finalPass.uniforms.bloomTexture.value = bloomComposer.renderTarget1.texture;

            finalComposer = new EffectComposer(renderer);
            finalComposer.addPass(renderScene);
            finalComposer.addPass(finalPass);
        }

        initPostprocessing();

        // Interaction
        let scrollTarget = 0;
        let scrollCurrent = 0;

        function updateScroll() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            scrollTarget = clamp(scrollTop / Math.max(docHeight, 1), 0, 1);
        }

        window.addEventListener('scroll', updateScroll, { passive: true });

        // Resize
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            camera.aspect = w / h;
            camera.updateProjectionMatrix();

            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(w, h);

            torusComposer.setPixelRatio(window.devicePixelRatio);
            torusComposer.setSize(w, h);
            bloomComposer.setPixelRatio(window.devicePixelRatio);
            bloomComposer.setSize(w, h);
            finalComposer.setPixelRatio(window.devicePixelRatio);
            finalComposer.setSize(w, h);

            atmoUniforms.uRes.value.set(w * window.devicePixelRatio, h * window.devicePixelRatio);
        }

        window.addEventListener('resize', onResize);

        // Render loop
        function renderLoop() {
            requestAnimationFrame(renderLoop);

            scrollCurrent = Lerp(scrollCurrent, scrollTarget, 0.08);
            camera.position.z = 14 - scrollCurrent * scrollDiveZ;

            galaxy.update(scrollCurrent);

            // Update atmosphere
            const t = performance.now() / 1000;
            atmoPoints.position.copy(camera.position);
            atmoUniforms.uTime.value = t * atmoSpeed * 8.0;
            finalPass.uniforms.iTime.value = t;

            // Render passes
            camera.layers.set(LAYERS.TORUS_SCENE);
            torusComposer.render();

            camera.layers.set(LAYERS.BLOOM_SCENE);
            bloomComposer.render();

            camera.layers.set(LAYERS.ENTIRE_SCENE);
            finalComposer.render();
        }

        // Start
        updateScroll();
        setTimeout(() => {
            document.getElementById('scroll-hint').style.opacity = '0';
        }, 4000);

        renderLoop();
    </script>
</body>
</html>
